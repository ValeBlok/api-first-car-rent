openapi: 3.1.0
info:
  title: CarRent API
  description: API для аренды автомобилей
  version: 1.0.0
paths:
  /registration:
    post:
      summary: Register User
      operationId: register_user_registration_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreation'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /bookings:
    post:
      summary: Create Booking
      operationId: create_booking_bookings_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /bookings/{booking_id}:
    delete:
      summary: Cancel Booking
      operationId: cancel_booking_bookings__booking_id__delete
      parameters:
      - name: booking_id
        in: path
        required: true
        schema:
          type: integer
          title: Booking Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /fines/{user_id}:
    get:
      summary: Check Fines
      operationId: check_fines_fines__user_id__get
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    BookingRequest:
      properties:
        car_id:
          type: integer
          title: Car Id
        user_id:
          type: integer
          title: User Id
        start_time:
          type: string
          format: date-time
          title: Start Time
        end_time:
          type: string
          format: date-time
          title: End Time
      type: object
      required:
      - car_id
      - user_id
      - start_time
      - end_time
      title: BookingRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    UserCreation:
      properties:
        license_number:
          type: integer
          title: License Number
        name:
          type: string
          title: Name
        surname:
          type: string
          title: Surname
        age:
          type: integer
          title: Age
        fine_count:
          type: integer
          title: Fine Count
          default: 0
      type: object
      required:
      - license_number
      - name
      - surname
      - age
      title: UserCreation
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
